version: "3.9"
name: training-server

services:
  trainer:
    build: .
    image: easytrainer-training-server:latest
    container_name: easytrainer_training_server
    ports:
      - "5100:5100"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TRAINING_SERVER_DATA_DIR=/data
    volumes:
      - training_data:/data
    restart: unless-stopped

volumes:
  training_data:
