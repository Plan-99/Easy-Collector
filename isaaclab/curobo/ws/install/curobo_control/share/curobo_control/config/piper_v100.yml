##
## Piper V100 6-DOF robot configuration for cuRobo
## Wide gripper version (0~0.05m sim, 0~0.10m real)
## base_link: arm_base, ee_link: link6 (no gripper_base, no tcp)
##

robot_cfg:
  kinematics:
    use_usd_kinematics: False
    urdf_path: "/root/ws/src/piper_description/urdf/piper_description_v100.urdf"
    asset_root_path: "/root/ws/src/piper_description"
    base_link: "arm_base"
    ee_link: "link6"
    cspace:
      joint_names: ["joint1", "joint2", "joint3", "joint4", "joint5", "joint6"]
      retract_config: [0.0, 1.57, -1.57, 0.0, 0.0, 0.0]
      null_space_weight: [1, 1, 1, 1, 1, 1]
      cspace_distance_weight: [1, 1, 1, 1, 1, 1]
      max_acceleration: 10.0
      max_jerk: 500.0
