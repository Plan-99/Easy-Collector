name: [TEST] PyArmor Obfuscation Only

on: workflow_dispatch

jobs:
  test-obfuscate-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PyArmor
        run: |
          python -m pip install --upgrade pip
          pip install pyarmor

      - name: Test Obfuscation on Specific File
        run: |
          TARGET_FILE="release/ui/main.py"
          
          echo "난독화 테스트 시작: $TARGET_FILE"
          
          mkdir -p dist/test_output
          
          pyarmor gen -O dist/test_output "$TARGET_FILE"
          
          echo "=== 난독화 결과 폴더 내용 ==="
          ls -R dist/test_output

      - name: Upload Obfuscated Result
        uses: actions/upload-artifact@v4
        with:
          name: pyarmor-test-result
          path: dist/test_output/