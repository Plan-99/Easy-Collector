name: "Obfuscate In-Place and Build"

on:
  push:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyarmor pyinstaller
          if [ -f requirements.launcher.txt ]; then pip install -r requirements.launcher.txt; fi

      # ▼▼▼ [핵심] 난독화 후 원본에 덮어씌우기 ▼▼▼
      - name: Obfuscate and Overwrite
        run: |
          echo "1. 난독화 시작 (결과물은 임시폴더 temp_obf에 저장)"
          
          # 제외할 파일은 --exclude로 지정 (체험판 용량 제한 회피)
          pyarmor gen -O temp_obf \
            -r release/ui src \
            --exclude "src/backend/lerobot" \
            --exclude "release/ui/launcher.py"

          echo "2. 난독화된 파일을 원본 폴더에 강제 덮어쓰기"
          # -r: 재귀적, -f: 강제(묻지 않고 덮어씀)
          # temp_obf 안의 구조가 이미 release/ui, src/... 로 되어있어서 그대로 덮임
          cp -rf temp_obf/* .
          
          echo "3. 덮어쓰기 완료. 임시폴더 삭제"
          rm -rf temp_obf
          
          echo "=== 파일 상태 확인 (main.py가 난독화 되었는지) ==="
          head -n 5 release/ui/main.py

      # ▼▼▼ [빌드] 경로 설정이 아주 심플해짐! ▼▼▼
      - name: Build with PyInstaller
        run: |
          echo "빌드 시작..."
          
          # --paths 지정할 필요 없음 (현재 폴더가 곧 소스니까)
          # --hidden-import src 도 필요 없을 수 있음 (자동 인식) 하지만 안전하게 둠
          
          pyinstaller --onefile --noconsole --name EasyLauncher \
            --add-data "release/ui/img:release/ui/img" \
            --hidden-import "src" \
            release/ui/main.py

      # [변경] zip 대신 deb 만들기
      - name: Build Debian Package
        run: |
          # 스크립트에 실행 권한 주기
          chmod +x build_deb_lite.sh
          
          # 스크립트 실행 (dist/EasyLauncher 파일을 가져다 씀)
          ./build_deb_lite.sh

      # [변경] 결과물 업로드 (zip 대신 deb)
      - name: Release to Public Repo
        uses: softprops/action-gh-release@v1
        with:
          repository: my-id/my-public-repo
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: |
            *.deb