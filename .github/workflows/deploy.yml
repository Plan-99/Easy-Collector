name: "Obfuscate In-Place and Build"

on:
  push:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          echo "1. 시스템 라이브러리 설치 (Qt6 필수 의존성)"
          sudo apt-get update
          
          sudo apt-get install -y \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-image0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libpulse0 \
            libasound2t64 \
            libegl1 \
            libopengl0 \
            libnss3

          echo "2. Python 패키지 설치"
          pip install --upgrade pip
          pip install pyarmor pyinstaller
          
          # 앱 구동에 필요한 Python 라이브러리
          pip install PySide6 shiboken6 licensing
          
          # requirements 파일이 있다면 설치
          if [ -f requirements.launcher.txt ]; then pip install -r requirements.launcher.txt; fi

      # ▼▼▼ [핵심] 난독화 후 원본에 덮어씌우기 ▼▼▼
      - name: Obfuscate and Overwrite
        run: |
          echo "1. 난독화 시작 (결과물은 임시폴더 temp_obf에 저장)"
          
          # 제외할 파일은 --exclude로 지정 (체험판 용량 제한 회피)
          pyarmor gen -O temp_obf \
            -r release/ui src \
            --exclude "src/backend/lerobot" \
            --exclude "release/ui/launcher.py"

          echo "2. [중요] Docker 마운트를 위해 Runtime 폴더를 src 안으로 이동"
          # temp_obf 안에 생성된 pyarmor_runtime_xxxx 폴더를 찾아서
          # temp_obf/src/ 안으로 이동시킵니다.
            
          # 런타임 폴더 이름 찾기 (랜덤이라 찾아서 변수에 넣음)
          RUNTIME_DIR=$(find temp_obf -maxdepth 1 -type d -name "pyarmor_runtime_*" -printf "%f\n")
            
          if [ -n "$RUNTIME_DIR" ]; then
              echo "Runtime folder found: $RUNTIME_DIR -> Moving to src/"
              mv "temp_obf/$RUNTIME_DIR" "temp_obf/src/"
          else
              echo "WARNING: Runtime folder not found!"
          fi

          echo "2. 난독화된 파일을 원본 폴더에 강제 덮어쓰기"
          # -r: 재귀적, -f: 강제(묻지 않고 덮어씀)
          # temp_obf 안의 구조가 이미 release/ui, src/... 로 되어있어서 그대로 덮임
          cp -rf temp_obf/* .
          
          echo "3. 덮어쓰기 완료. 임시폴더 삭제"
          rm -rf temp_obf
          
          echo "=== 파일 상태 확인 (main.py가 난독화 되었는지) ==="
          head -n 5 release/ui/main.py

      # ▼▼▼ [빌드] 경로 설정이 아주 심플해짐! ▼▼▼
      - name: Build with PyInstaller
        run: |
          echo "빌드 시작..."
          
          # --paths 지정할 필요 없음 (현재 폴더가 곧 소스니까)
          # --hidden-import src 도 필요 없을 수 있음 (자동 인식) 하지만 안전하게 둠
          
          pyinstaller --noconfirm --onefile --noconsole --name EasyLauncher \
            --add-data "release/ui/img:release/ui/img" \
            --collect-all PySide6 \
            --collect-all shiboken6 \
            --collect-all licensing \
            --hidden-import "src" \
            release/ui/main.py

      # [변경] zip 대신 deb 만들기
      - name: Build Debian Package
        run: |
          # 스크립트에 실행 권한 주기
          chmod +x .github/workflows/build_deb.sh
          
          # 스크립트 실행 (dist/EasyLauncher 파일을 가져다 씀)
          ./.github/workflows/build_deb.sh

      # [변경] 결과물 업로드 (zip 대신 deb)
      - name: Release to Public Repo
        uses: softprops/action-gh-release@v1
        with:
          repository: Plan-99/Easy-Collector-Release
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: |
            *.deb