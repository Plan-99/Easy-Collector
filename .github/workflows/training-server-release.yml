name: Package Training Server

on:
  push:
    branches: [main, module_up]
    paths:
      - 'training_server/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          if [ ! -f training_server/version.json ]; then
            echo "training_server/version.json missing — aborting." >&2
            exit 1
          fi
          VERSION=$(python3 -c "import json; print(json.load(open('training_server/version.json'))['version'])")
          NAME=$(python3 -c "import json; print(json.load(open('training_server/version.json'))['name'])")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "NAME=$NAME" >> "$GITHUB_ENV"
          echo "TAG=training-server-v$VERSION" >> "$GITHUB_ENV"
          echo "TAR_NAME=training-server-v$VERSION.tar.gz" >> "$GITHUB_ENV"

      - name: Check if release already exists
        id: check_release
        run: |
          if gh release view "$TAG" --repo Plan-99/Easy-Trainer-Modules &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - name: Package training_server
        if: steps.check_release.outputs.exists == 'false'
        run: |
          mkdir -p dist
          # Tar contains a single top-level entry "training_server".
          # Launcher extracts INTO <project_root>/backend/training_server/ at install time.
          tar -czf "dist/$TAR_NAME" -C . training_server
          ls -lh "dist/$TAR_NAME"

      - name: Create release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          repository: Plan-99/Easy-Trainer-Modules
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          tag_name: ${{ env.TAG }}
          name: "${{ env.NAME }} v${{ env.VERSION }}"
          files: dist/${{ env.TAR_NAME }}
          body: |
            **${{ env.NAME }}** v${{ env.VERSION }}

            Standalone Docker training server. Extract into `/opt/easytrainer_server/`
            on the target host, then `docker compose up -d` (or use the launcher).
          generate_release_notes: false
