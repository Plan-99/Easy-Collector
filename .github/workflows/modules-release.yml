name: Package Modules

on:
  push:
    branches: [main, module_up]
    paths:
      - 'modules/**'
      - 'isaaclab/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.detect.outputs.changed_modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: detect
        run: |
          # Compare with previous commit on main
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)

          MODULES=()
          for category in robots sensors extensions sim; do
            if [ ! -d "modules/$category" ]; then continue; fi
            for module_dir in modules/$category/*/; do
              [ ! -d "$module_dir" ] && continue
              [ ! -f "$module_dir/module.json" ] && continue

              module_name=$(basename "$module_dir")
              # Check if any file in this module changed
              if echo "$CHANGED_FILES" | grep -q "^modules/$category/$module_name/"; then
                MODULES+=("$category/$module_name")
              fi
            done
          done

          # isaaclab/ 변경 시 sim_isaaclab 모듈이 변경된 것으로 처리
          if echo "$CHANGED_FILES" | grep -q "^isaaclab/"; then
            if [ -f "modules/extensions/sim_isaaclab/module.json" ]; then
              # 중복 방지
              if [[ ! " ${MODULES[*]} " =~ " extensions/sim_isaaclab " ]]; then
                MODULES+=("extensions/sim_isaaclab")
              fi
            fi
          fi

          if [ ${#MODULES[@]} -eq 0 ]; then
            echo "changed_modules=[]" >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${MODULES[@]}" | jq -R . | jq -s -c .)
            echo "changed_modules=$JSON" >> "$GITHUB_OUTPUT"
          fi
          echo "Changed modules: ${MODULES[*]}"

  package:
    needs: detect-changes
    if: needs.detect-changes.outputs.changed_modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.changed_modules) }}
    steps:
      - uses: actions/checkout@v4

      - name: Package and release module
        run: |
          MODULE_DIR="modules/${{ matrix.module }}"
          MODULE_JSON="$MODULE_DIR/module.json"

          module_id=$(python3 -c "import json; print(json.load(open('$MODULE_JSON'))['id'])")
          module_version=$(python3 -c "import json; print(json.load(open('$MODULE_JSON'))['version'])")
          module_name=$(python3 -c "import json; print(json.load(open('$MODULE_JSON'))['name'])")

          category=$(dirname "${{ matrix.module }}")
          folder_name=$(basename "${{ matrix.module }}")

          tar_name="module-${module_id}-${module_version}.tar.gz"
          mkdir -p dist

          # sim_isaaclab은 isaaclab/ 소스도 함께 패키징
          if [ "$module_id" = "sim_isaaclab" ]; then
            STAGE_DIR=$(mktemp -d)
            cp -r "$MODULE_DIR" "$STAGE_DIR/$folder_name"
            cp -r "isaaclab" "$STAGE_DIR/$folder_name/isaaclab"
            tar -czf "dist/$tar_name" -C "$STAGE_DIR" "$folder_name"
            rm -rf "$STAGE_DIR"
          else
            tar -czf "dist/$tar_name" -C "modules/$category" "$folder_name"
          fi

          echo "MODULE_ID=$module_id" >> "$GITHUB_ENV"
          echo "MODULE_VERSION=$module_version" >> "$GITHUB_ENV"
          echo "MODULE_NAME=$module_name" >> "$GITHUB_ENV"
          echo "TAR_NAME=$tar_name" >> "$GITHUB_ENV"
          echo "PACKAGED: $tar_name (v${module_version})"

      - name: Check if release exists
        id: check_release
        run: |
          TAG="module-${MODULE_ID}-v${MODULE_VERSION}"
          if gh release view "$TAG" --repo Plan-99/Easy-Trainer-Modules &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          repository: Plan-99/Easy-Trainer-Modules
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          tag_name: ${{ env.TAG }}
          name: "${{ env.MODULE_NAME }} v${{ env.MODULE_VERSION }}"
          files: dist/${{ env.TAR_NAME }}
          body: |
            Module: **${{ env.MODULE_NAME }}** (`${{ env.MODULE_ID }}`)
            Version: `${{ env.MODULE_VERSION }}`
          generate_release_notes: false
