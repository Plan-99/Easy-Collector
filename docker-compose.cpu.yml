version: "3.9"
name: easytrainer

services:
  # ── Frontend: same as GPU version ──
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: easytrainer_frontend
    network_mode: host
    environment:
      - NODE_OPTIONS=--max-old-space-size=${EC_NODE_MAX_OLD_SPACE_SIZE:-384}
      - NPM_CONFIG_REGISTRY=${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
      - NPM_CONFIG_FETCH_RETRIES=${NPM_CONFIG_FETCH_RETRIES:-5}
      - NPM_CONFIG_FETCH_RETRY_MINTIMEOUT=${NPM_CONFIG_FETCH_RETRY_MINTIMEOUT:-20000}
      - NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT=${NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT:-120000}
    volumes:
      - ./frontend:/app
      - ui_node_modules:/app/node_modules
    restart: unless-stopped

  # ── Backend: Flask API + PyTorch (CPU only, no GPU) ──
  # 2단계 빌드: easytrainer-backend-base → easytrainer-backend (모듈 deps baked)
  # bootstrap / 모듈 변경 시: `bash scripts/rebuild_images.sh backend`
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        BASE_IMAGE: easytrainer-backend-base:latest
    image: easytrainer-backend:latest
    container_name: easytrainer_backend
    network_mode: host
    privileged: true
    # No GPU deploy block
    environment:
      # /root/backend 가 PYTHONPATH 에 포함되어야 한다 — deploy.yml 의 PyArmor
      # obfuscation 결과로 생성되는 pyarmor_runtime_000000 폴더가 backend/ 안에
      # 들어있어서, backend/__init__.py 의 `from pyarmor_runtime_000000 import
      # __pyarmor__` 가 top-level import 로 해석된다. 빠지면 fresh 설치 deb 의
      # 마이그레이션 단계에서 ModuleNotFoundError 발생.
      - PYTHONPATH=/root:/root/backend:/root/backend/lerobot/src
      - EC_DEBUG=${EC_DEBUG:-1}
      - EC_BACKEND_AUTORELOAD=${EC_BACKEND_AUTORELOAD:-1}
      - EC_MINIMAL_API=${EC_MINIMAL_API:-0}
      - EASYTRAINER_DATA_DIR=${EASYTRAINER_DATA_DIR:-/opt/easytrainer}
      - EASYTRAINER_LOG_DIR=${EASYTRAINER_LOG_DIR:-/tmp/easytrainer/logs}
      - EASYTRAINER_CONFIG_PATH=${EASYTRAINER_CONFIG_PATH:-/opt/easytrainer/config.json}
      - PIP_NO_CACHE_DIR=${PIP_NO_CACHE_DIR:-0}
      - PIP_CACHE_DIR=${PIP_CACHE_DIR:-/root/python_pkgs/.cache/pip}
    volumes:
      - ./backend:/root/backend
      - ./python_pkgs:/root/python_pkgs
      - ./requirements.txt:/root/requirements.txt
      - /opt/easytrainer:/opt/easytrainer
      - /dev:/dev
      - /dev/shm:/dev/shm
    working_dir: /root
    restart: unless-stopped

  # ── ROS 2: gRPC Bridge + IK Solver + Robot/Sensor drivers ──
  # 2단계 빌드: easytrainer-ros2-base → easytrainer-ros2 (모듈 deps baked)
  # bootstrap / 모듈 변경 시: `bash scripts/rebuild_images.sh ros2`
  ros2:
    build:
      context: .
      dockerfile: ros2/Dockerfile
      args:
        BASE_IMAGE: easytrainer-ros2-base:latest
    image: easytrainer-ros2:latest
    container_name: easytrainer_ros2
    network_mode: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      - EASYTRAINER_DATA_DIR=${EASYTRAINER_DATA_DIR:-/opt/easytrainer}
      - EASYTRAINER_CONFIG_PATH=${EASYTRAINER_CONFIG_PATH:-/opt/easytrainer/config.json}
    volumes:
      - ./ros2/ros2_ws:/root/ros2_ws
      - ./ros2/ros2_bridge:/root/ros2/ros2_bridge
      - ./ros2/examples:/root/ros2/examples
      - /opt/easytrainer:/opt/easytrainer
      - /dev:/dev
      - /dev/shm:/dev/shm
      - /tmp/.X11-unix:/tmp/.X11-unix
    restart: unless-stopped

volumes:
  ui_node_modules:
