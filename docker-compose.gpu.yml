version: "3.9"

services:
  service:
    build:
      context: .
      dockerfile: Dockerfile.main
    image: easy-collector:latest
    container_name: easy_collector_service
    privileged: true
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      ros2:
        condition: service_healthy
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY}
      - PYTHONPATH=/root/src:/root/src/backend/lerobot/src
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      # NPM
      - NPM_CONFIG_REGISTRY=${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
      - NPM_CONFIG_FETCH_RETRIES=${NPM_CONFIG_FETCH_RETRIES:-5}
      - NPM_CONFIG_FETCH_RETRY_MINTIMEOUT=${NPM_CONFIG_FETCH_RETRY_MINTIMEOUT:-20000}
      - NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT=${NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT:-120000}
      # Pip
      - PIP_NO_CACHE_DIR=${PIP_NO_CACHE_DIR:-0}
      - PIP_CACHE_DIR=${PIP_CACHE_DIR:-/root/python_pkgs/.cache/pip}
      # EC flags
      - EC_NO_SIDE_PROCESSES=${EC_NO_SIDE_PROCESSES:-0}
      - EC_DEBUG=${EC_DEBUG:-0}
      - EC_NO_FRONTEND=${EC_NO_FRONTEND:-0}
      - EC_SKIP_TORCHVISION_COMPAT=${EC_SKIP_TORCHVISION_COMPAT:-0}
      - EC_NODE_MAX_OLD_SPACE_SIZE=${EC_NODE_MAX_OLD_SPACE_SIZE:-384}
      - EC_MINIMAL_API=${EC_MINIMAL_API:-0}
      - EC_NO_ROS=${EC_NO_ROS:-1}
      - EC_BACKEND_AUTORELOAD=${EC_BACKEND_AUTORELOAD:-1}
      - EASYTRAINER_DATA_DIR=${EASYTRAINER_DATA_DIR:-/opt/easytrainer}
      - EASYTRAINER_LOG_DIR=${EASYTRAINER_LOG_DIR:-/tmp/easytrainer/logs}
      - EASYTRAINER_CONFIG_PATH=${EASYTRAINER_CONFIG_PATH:-/opt/easytrainer/config.json}
      # gRPC bridge
      - GRPC_BRIDGE_HOST=${GRPC_BRIDGE_HOST:-localhost}
      - GRPC_BRIDGE_PORT=${GRPC_BRIDGE_PORT:-50051}
    volumes:
      - /dev:/dev
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./src:/root/src
      - ./python_pkgs:/root/python_pkgs
      - ./requirements.txt:/root/requirements.txt
      - /opt/easytrainer:/opt/easytrainer
      - ./start_services.sh:/usr/local/bin/start_services.sh:ro
      - ui_node_modules:/root/src/ui/node_modules
      - easytrainer_shm:/dev/shm/easytrainer
    working_dir: /root
    command: bash -lc "bash /usr/local/bin/start_services.sh"

  ros2:
    build:
      context: .
      dockerfile: Dockerfile.ros2
    image: easy-collector-ros2:latest
    container_name: easy_collector_ros2
    privileged: true
    network_mode: host
    healthcheck:
      test: ["CMD", "python3", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=2)"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      - PYTHONPATH=/root/src:/root/src/backend/lerobot/src:/opt/openrobots/lib/python3.10/site-packages
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - EASYTRAINER_DATA_DIR=${EASYTRAINER_DATA_DIR:-/opt/easytrainer}
      - EASYTRAINER_LOG_DIR=${EASYTRAINER_LOG_DIR:-/tmp/easytrainer/logs}
    volumes:
      - /dev:/dev
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./ros2_ws:/root/ros2_ws
      - ./src:/root/src
      - ./python_pkgs:/root/python_pkgs
      - /opt/easytrainer:/opt/easytrainer:ro
      - ./start_ros2_services.sh:/usr/local/bin/start_ros2_services.sh:ro
      - easytrainer_shm:/dev/shm/easytrainer
    working_dir: /root
    command: bash -lc "bash /usr/local/bin/start_ros2_services.sh"

volumes:
  ui_node_modules:
  easytrainer_shm:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=512m
