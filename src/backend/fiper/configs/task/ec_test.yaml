defaults:
  - base

name: ec_test
description: "EC test task configuration"
type: "realworld"

environment:
  name: "ECTestEnv-v0"
  ts: 0.2
  max_episode_steps: 120
  fail_on_error: false
  fail_after_steps: false

observation_space:
  observation_type: "rgb"
  rgb:
    format: "(H, W, C)"
    shape: (200, 150, 3)
  observation_dim: 3

state_space:
  state_dim: 7
  state_types: "continuous"
  state_mapping:
    position: [0, 1, 2, 3, 4, 5, 6]

action_space:
  action_type: "continuous"
  actions:
    dim: 7
    action_mapping:
      position: [0, 1, 2, 3, 4, 5, 6]
  action_pred:
    format: "(batch_size, prediction_horizon, action_dim)"
    action_prediction_horizon: 16
    batch_size: 30
    shape: (${task.action_space.action_pred.batch_size}, ${task.action_space.action_pred.action_prediction_horizon}, ${task.action_space.actions.dim})
  action_execution_horizon: 4